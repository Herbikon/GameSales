services:
  web:
    build:
      context: .
      args:
        PYTHON_VERSION: 3.11-slim
    image: gamesales:latest
    user: appuser
    ports:
      - "8000:8000"
    volumes:
      - gamesales_data:/app
    environment:
      - SECRET_KEY=${SECRET_KEY}
      - DEBUG=${DEBUG:-False}
      - ALLOWED_HOSTS=${ALLOWED_HOSTS:-localhost}
      - DJANGO_SETTINGS_MODULE=web_bot.settings
    env_file:
      - .env
    networks:
      - gamesales_network
    restart: unless-stopped
    deploy:
      replicas: 2
      resources:
        limits:
          cpus: '0.5'
          memory: 512M
      restart_policy:
        condition: on-failure

networks:
  gamesales_network:
    driver: bridge

volumes:
  gamesales_data:
    driver: local